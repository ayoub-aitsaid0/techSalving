name: Build Windows App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permet de lancer manuellement depuis l'interface GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci || npm install

    - name: Build Windows Executable
      # Utilise le script configuré dans package.json pour compiler sqlite en natif Windows
      run: npm run build:win
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Gestion-Documents-Windows-Installer
        # Le fichier sort dans le répertoire dist/ de electron-builder
        path: dist/*.exe
